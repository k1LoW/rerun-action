name: Retry on transient failure

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  # Example 1: Rerun when a specific pattern is found in a specific job's log
  retry-on-pattern:
    runs-on: ubuntu-slim
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      actions: write
    steps:
      - uses: k1LoW/rerun-action@v0
        with:
          run_id: ${{ github.event.workflow_run.id }}
          pattern: 'Network partition'
          job: 'build-and-test'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          max_attempts: '2'

