name: Test Verify

on:
  workflow_run:
    workflows: ["Test Target"]
    types:
      - completed

jobs:
  verify:
    runs-on: ubuntu-slim
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.run_attempt > 1 }}
    steps:
      - name: Verify rerun succeeded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          echo "Test Target succeeded on attempt ${{ github.event.workflow_run.run_attempt }}"
          echo "This confirms the rerun-action worked correctly."
