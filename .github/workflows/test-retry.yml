name: Test Retry

on:
  workflow_run:
    workflows: ["Test Target"]
    types:
      - completed

jobs:
  retry-with-pattern-and-job:
    runs-on: ubuntu-slim
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Rerun with pattern + job
        uses: ./
        with:
          run_id: ${{ github.event.workflow_run.id }}
          pattern: 'Network partition'
          job: 'flaky-job'
          max_attempts: 3
