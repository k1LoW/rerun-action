name: Test Retry

on:
  workflow_run:
    workflows: ["Test Target"]
    types:
      - completed

jobs:
  retry-with-pattern-and-job:
    runs-on: ubuntu-slim
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Rerun with pattern + job
        uses: ./
        with:
          run_id: ${{ github.event.workflow_run.id }}
          pattern: 'Network partition'
          job: 'flaky-job'
          max_attempts: 3
