name: Test Target

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Test: pattern + job
  flaky-job:
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Simulate transient failure
        run: |
          if [[ "${{ github.run_attempt }}" -le 1 ]]; then
            echo "Error: Network partition occurred"
            exit 1
          fi
          echo "Succeeded on attempt ${{ github.run_attempt }}"

      - name: Check current job log
        id: check
        if: ${{ always() }}
        uses: ./check
        with:
          job: flaky-job
          pattern: Network partition

      - name: Assert check result
        if: ${{ always() }}
        run: |
          echo "matched=${{ steps.check.outputs.matched }}"
          echo "reason=${{ steps.check.outputs.reason }}"

          if [[ "${{ github.run_attempt }}" -le 1 ]]; then
            if [[ "${{ steps.check.outputs.matched }}" != "true" ]]; then
              echo "::error::Expected matched=true on first attempt"
              exit 1
            fi
          else
            if [[ "${{ steps.check.outputs.matched }}" != "false" ]]; then
              echo "::error::Expected matched=false after rerun"
              exit 1
            fi
          fi

  # Test: job only (no pattern)
  always-pass:
    runs-on: ubuntu-latest
    steps:
      - name: This job always passes
        run: echo "OK"

  # Verify that flaky-job was rerun and succeeded
  verify:
    needs: flaky-job
    runs-on: ubuntu-latest
    steps:
      - name: Confirm rerun succeeded
        run: |
          echo "flaky-job succeeded on attempt ${{ github.run_attempt }}"
          if [[ "${{ github.run_attempt }}" -le 1 ]]; then
            echo "::error::Expected run_attempt > 1, but got ${{ github.run_attempt }}"
            exit 1
          fi
